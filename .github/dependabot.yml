version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-deps:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      prod-deps:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    assignees:
      - "sleberknight"
      - "chrisrohr"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 5
      semver-patch-days: 5
      semver-minor-days: 14
      semver-major-days: 30
      exclude:
        - "org.kiwiproject:*"
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-deps:
        patterns:
          - "*"
    assignees:
      - "sleberknight"
      - "chrisrohr"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"

  # Docker image tracking (for test containers)
  # Split into separate directories/entries (rather than one directory with a
  # shared group) so that a resolver failure for one image's registry can't
  # block updates for the other.
  - package-ecosystem: "docker"
    directory: ".github/dependabot-images/logstash"
    schedule:
      interval: "weekly"
    assignees:
      - "sleberknight"
      - "chrisrohr"
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: "docker"
    directory: ".github/dependabot-images/netcat"
    schedule:
      interval: "weekly"
    assignees:
      - "sleberknight"
      - "chrisrohr"
    commit-message:
      prefix: "chore(deps)"
